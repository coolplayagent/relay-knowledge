repos:
- repo: local
  hooks:
  - id: cargo-fmt
    name: cargo fmt
    entry: cargo fmt --all
    language: system
    pass_filenames: false
    files: ^(Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|src/|tests/)

  - id: cargo-clippy
    name: cargo clippy
    entry: cargo clippy --all-targets --all-features -- -D warnings
    language: system
    pass_filenames: false
    files: ^(Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|src/|tests/)

  - id: cargo-test
    name: cargo test
    entry: cargo test --all-targets --all-features
    language: system
    pass_filenames: false
    files: ^(Cargo\.toml|Cargo\.lock|rust-toolchain\.toml|src/|tests/)
